name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

env:
  TRIGGER_PHRASE: /claude-review

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      should_run: ${{ steps.decide.outputs.should_run }}
      pr_number: ${{ steps.decide.outputs.pr_number }}
    steps:
      - name: Decide whether to run
        id: decide
        uses: actions/github-script@v7
        with:
          script: |
            const event = context.eventName;

            if (event === "pull_request") {
              const pr = context.payload.pull_request;
              const isFork = pr.head.repo.full_name !== pr.base.repo.full_name;
              if (isFork) {
                core.info("Fork PR via pull_request event: secrets unavailable here. " +
                  "A maintainer can run the review by commenting the trigger phrase.");
                core.setOutput("should_run", "false");
                return;
              }
              core.setOutput("should_run", "true");
              core.setOutput("pr_number", String(pr.number));
              return;
            }

            const issue = context.payload.issue;
            const comment = context.payload.comment;
            if (!issue?.pull_request) {
              core.info("Comment is not on a pull request; ignoring.");
              core.setOutput("should_run", "false");
              return;
            }
            const phrase = process.env.TRIGGER_PHRASE;
            if (!comment?.body?.includes(phrase)) {
              core.info(`Comment does not contain "${phrase}"; ignoring.`);
              core.setOutput("should_run", "false");
              return;
            }

            const { owner, repo } = context.repo;
            const actor = comment.user.login;
            const { data: perm } =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner, repo, username: actor,
              });
            const allowed = perm.permission === "write" || perm.permission === "admin";
            if (!allowed) {
              core.info(`@${actor} has "${perm.permission}" access (need write/admin); ignoring.`);
              core.setOutput("should_run", "false");
              return;
            }

            core.info(`Triggered by @${actor} (${perm.permission}) on PR #${issue.number}.`);
            core.setOutput("should_run", "true");
            core.setOutput("pr_number", String(issue.number));

  claude-review:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: React to trigger comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: "eyes",
            });

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', needs.gate.outputs.pr_number) || '' }}

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Review this Muxy extension PR: ${{ github.repository }}/pull/${{ needs.gate.outputs.pr_number }}

            Muxy extensions are npm + Vite projects. The manifest is the "muxy" key in
            package.json; source lives in src/ and builds to dist/. Read the extension's
            package.json and the muxy-extension skill guidance before judging. Use
            `gh pr diff ${{ needs.gate.outputs.pr_number }} --repo ${{ github.repository }}`
            to see what changed.

            Evaluate ONLY these checks, each as a single pass/fail line:

            1. Safe — does nothing harmful to the user's computer (no destructive shell/fs
               commands, no exfiltration, no network calls to unexpected hosts) AND declares
               only the permissions it actually uses (least privilege).
            2. Quality — lightweight and well-built: no heavy/needless deps, no dead or
               duplicated code, has a build script, no hardcoded ~/.config/muxy paths.
            3. Design — follows Muxy guidelines: colors are var(--muxy-*) (no hex chrome),
               spacing/font/icon/radius values come from the Muxy scale, icons weight 600.
            4. New vs Update — state which it is. If an update, confirm the version was bumped.
               If new, confirm it has the required manifest fields.
            5. Naming — the extension name is simple kebab-case with NO "muxy-" or
               "extension-" prefix, and screenshots follow the standard naming convention.

            Do NOT post a PR comment and do NOT run any git/gh write commands. Instead,
            WRITE your review to the file `claude-review.md` in the repository root using
            the Write tool. The file must start with the exact marker line below, then a
            blank line, then the review in this format — nothing else, no prose:

            <!-- muxy-claude-review -->

            **Extension review** — <New extension | Update vX.Y.Z>

            - [x] Safe — <one-line reason>
            - [ ] Quality — <one-line reason it failed, or "looks good">
            - [x] Design — <one-line reason>
            - [x] Naming — <one-line reason>

            <one short overall line: ✅ ready to merge / ⚠️ needs changes>

            Use [x] for pass and [ ] for fail. Omit the "New vs Update" row from the
            checkbox list since it's already in the header. Be terse — the whole review
            should fit in a few lines.
          claude_args: '--allowed-tools "Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep,Write"'

      - name: Replace previous review comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- muxy-claude-review -->";
            const path = `${process.env.GITHUB_WORKSPACE}/claude-review.md`;

            if (!fs.existsSync(path)) {
              core.info("No claude-review.md produced; leaving any existing comment untouched.");
              return;
            }
            const body = fs.readFileSync(path, "utf8").trim();
            if (!body || !body.includes(marker)) {
              core.info("Review file empty or missing marker; skipping comment.");
              return;
            }

            const { owner, repo } = context.repo;
            const issue_number = Number("${{ needs.gate.outputs.pr_number }}");

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number, per_page: 100 },
            );
            const mine = comments.filter(
              (c) => c.user?.type === "Bot" && c.body?.includes(marker),
            );
            for (const c of mine) {
              await github.rest.issues.deleteComment({ owner, repo, comment_id: c.id });
            }

            await github.rest.issues.createComment({ owner, repo, issue_number, body });
