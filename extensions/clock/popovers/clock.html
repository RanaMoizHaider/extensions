<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        /* Fall back gracefully if the host hasn't injected its theme vars. */
        --text: var(--muxy-text, rgba(0, 0, 0, 0.9));
        --muted: var(--muxy-text-muted, rgba(0, 0, 0, 0.5));
        --surface: var(--muxy-surface, rgba(0, 0, 0, 0.06));
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: var(--muxy-text, rgba(255, 255, 255, 0.92));
          --muted: var(--muxy-text-muted, rgba(255, 255, 255, 0.55));
          --surface: var(--muxy-surface, rgba(255, 255, 255, 0.08));
        }
      }

      html,
      body {
        margin: 0;
        /* Let the native popover material show through. */
        background: transparent;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif;
        color: var(--text);
        -webkit-user-select: none;
        user-select: none;
      }
      .card {
        display: inline-flex;
        flex-direction: column;
        align-items: center;
        gap: 4px;
        padding: 18px 28px;
        border-radius: 12px;
        background: var(--surface);
      }
      #time {
        font-size: 40px;
        font-weight: 600;
        font-variant-numeric: tabular-nums;
        letter-spacing: 1px;
        line-height: 1;
      }
      #date {
        font-size: 13px;
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div id="time">--:--:--</div>
      <div id="date"></div>
    </div>

    <script>
      const timeEl = document.getElementById("time");
      const dateEl = document.getElementById("date");

      function render() {
        const now = new Date();
        timeEl.textContent = now.toLocaleTimeString();
        dateEl.textContent = now.toLocaleDateString(undefined, {
          weekday: "long",
          month: "long",
          day: "numeric",
        });
      }

      // Tick on the second boundary so the display stays in sync with wall time.
      function tick() {
        render();
        setTimeout(tick, 1000 - (Date.now() % 1000));
      }
      tick();

      // Size the popover to fit the laid-out content (requires panels:write).
      function fit() {
        if (window.muxy && muxy.popover) {
          muxy.popover.resize(
            document.documentElement.scrollWidth,
            document.documentElement.scrollHeight,
          );
        }
      }
      window.addEventListener("load", fit);
    </script>
  </body>
</html>
